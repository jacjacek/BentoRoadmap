<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica Neue, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#f8f8f7"/>

  <!-- ── LEFT: Branding ── -->

  <!-- Logo mark -->
  <rect x="80" y="102" width="50" height="50" rx="11" fill="none" stroke="#1a1a19" stroke-width="2.5"/>
  <rect x="90" y="113" width="30" height="13" rx="3" fill="#1a1a19"/>
  <rect x="90" y="130" width="13" height="13" rx="3" fill="#1a1a19"/>
  <rect x="107" y="130" width="13" height="13" rx="3" fill="#1a1a19"/>

  <!-- Brand name + URL -->
  <text x="144" y="124" font-size="17" font-weight="600" fill="#1a1a19" letter-spacing="-0.3">Bento Roadmap</text>
  <text x="144" y="142" font-size="11" fill="#999894">bentoroadmap.com</text>

  <!-- Main headline -->
  <text x="80" y="262" font-size="60" font-weight="700" fill="#1a1a19" letter-spacing="-2">Plan visually.</text>
  <text x="80" y="334" font-size="60" font-weight="700" fill="#1a1a19" letter-spacing="-2">Ship faster.</text>

  <!-- Tagline -->
  <text x="80" y="382" font-size="16" fill="#78756f">Local-first roadmap that runs</text>
  <text x="80" y="402" font-size="16" fill="#78756f">entirely in your browser.</text>

  <!-- Feature pills -->
  <rect x="80"  y="430" width="84"  height="26" rx="13" fill="#ebebea"/>
  <text x="122" y="447" text-anchor="middle" font-size="11" fill="#6b6b6b">No signup</text>

  <rect x="174" y="430" width="92"  height="26" rx="13" fill="#ebebea"/>
  <text x="220" y="447" text-anchor="middle" font-size="11" fill="#6b6b6b">No backend</text>

  <rect x="276" y="430" width="104" height="26" rx="13" fill="#ebebea"/>
  <text x="328" y="447" text-anchor="middle" font-size="11" fill="#6b6b6b">Works offline</text>

  <!-- ── RIGHT: App grid mockup ── -->

  <!-- Outer frame -->
  <rect x="570" y="40" width="590" height="550" rx="18" fill="#ffffff" stroke="#e8e8e6" stroke-width="1"/>

  <!-- Period label -->
  <text x="600" y="66" font-size="11" font-weight="500" fill="#999894" letter-spacing="0.06em">Q1 2025  ·  Jan – Mar</text>

  <!-- ─ Row 1 ─ -->

  <!-- T1 3-wide · Mobile app redesign · In progress -->
  <rect x="600" y="78" width="528" height="120" rx="10" fill="#ffffff" stroke="#cccbc8" stroke-width="1"/>
  <text x="616" y="105" font-size="13" font-weight="600" fill="#1a1a19">Mobile app redesign</text>
  <text x="616" y="123" font-size="11" fill="#6b6b6b">New navigation and onboarding flow</text>
  <circle cx="617" cy="176" r="3.5" fill="#4a8ef5"/>
  <text x="626" y="180" font-size="10" fill="#4a8ef5">In progress</text>

  <!-- ─ Row 2 ─ -->

  <!-- T2 2-wide · User research · Backlog -->
  <rect x="600" y="208" width="348" height="120" rx="10" fill="#ffffff" stroke="#e8e8e6" stroke-width="1"/>
  <text x="616" y="235" font-size="13" font-weight="600" fill="#1a1a19">User research</text>
  <text x="616" y="253" font-size="11" fill="#6b6b6b">Round 2 interviews</text>
  <circle cx="617" cy="306" r="3.5" fill="#999894"/>
  <text x="626" y="310" font-size="10" fill="#888480">Backlog</text>

  <!-- T3 1-wide · API v2 · Blocked (dashed border) -->
  <rect x="958" y="208" width="170" height="120" rx="10" fill="#ffffff" stroke="#d8d7d4" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="974" y="235" font-size="13" font-weight="600" fill="#1a1a19">API v2</text>
  <text x="974" y="253" font-size="11" fill="#6b6b6b">Endpoint schema</text>
  <circle cx="975" cy="306" r="3.5" fill="#e07070"/>
  <text x="984" y="310" font-size="10" fill="#e07070">Blocked</text>

  <!-- ─ Row 3 ─ -->

  <!-- T4 1-wide · CI/CD · Done -->
  <rect x="600" y="338" width="170" height="90" rx="10" fill="#ffffff" stroke="#e8e8e6" stroke-width="1"/>
  <text x="616" y="365" font-size="13" font-weight="600" fill="#888480">CI/CD setup</text>
  <circle cx="617" cy="406" r="3.5" fill="#52b788"/>
  <text x="626" y="410" font-size="10" fill="#52b788">Done</text>

  <!-- T5 2-wide · Analytics · In progress -->
  <rect x="780" y="338" width="348" height="90" rx="10" fill="#ffffff" stroke="#cccbc8" stroke-width="1"/>
  <text x="796" y="365" font-size="13" font-weight="600" fill="#1a1a19">Analytics dashboard</text>
  <text x="796" y="383" font-size="11" fill="#6b6b6b">Usage metrics &amp; trends</text>
  <circle cx="797" cy="406" r="3.5" fill="#4a8ef5"/>
  <text x="806" y="410" font-size="10" fill="#4a8ef5">In progress</text>

  <!-- ─ Row 4: ghost placeholders ─ -->
  <rect x="600" y="438" width="170" height="90" rx="10" fill="none" stroke="#dddcda" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="685" y="489" text-anchor="middle" font-size="20" fill="#cccbc8">+</text>

  <rect x="780" y="438" width="170" height="90" rx="10" fill="none" stroke="#dddcda" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="865" y="489" text-anchor="middle" font-size="20" fill="#cccbc8">+</text>

  <rect x="958" y="438" width="170" height="90" rx="10" fill="none" stroke="#dddcda" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="1043" y="489" text-anchor="middle" font-size="20" fill="#cccbc8">+</text>

</svg>
